version: "3.9"

services:
  db:
    image: postgres:14
    environment:
      POSTGRES_DB: tasks
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
    volumes:
      - db-data:/var/lib/postgresql/data
      - ./app/init.sql:/docker-entrypoint-initdb.d/init.sql

  redis:
    image: redis:7

  app1:
    build: ./app
    environment:
      DB_HOST: db
      DB_NAME: tasks
      DB_USER: admin
      DB_PASSWORD: admin
      REDIS_HOST: redis
    depends_on:
      - db
      - redis

  app2:
    build: ./app
    environment:
      DB_HOST: db
      DB_NAME: tasks
      DB_USER: admin
      DB_PASSWORD: admin
      REDIS_HOST: redis
    depends_on:
      - db
      - redis

  app3:
    build: ./app
    environment:
      DB_HOST: db
      DB_NAME: tasks
      DB_USER: admin
      DB_PASSWORD: admin
      REDIS_HOST: redis
    depends_on:
      - db
      - redis

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - app1
      - app2
      - app3

  prometheus:
    image: prom/prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    ports:
      - "8080:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro

volumes:
  db-data: