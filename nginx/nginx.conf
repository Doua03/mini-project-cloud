events {}

http {
    upstream flask_apps {
        server app1:5000;
        server app2:5000;
        server app3:5000;
    }

    server {
        listen 80;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        ssl_certificate     /etc/nginx/certs/cert.pem;
        ssl_certificate_key /etc/nginx/certs/key.pem;

        location / {
            proxy_pass http://flask_apps;
            proxy_set_header Host $host;
        }
    }
}